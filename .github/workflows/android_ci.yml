name: Android CI Manual & PR

on:
  # Позволяет запускать Action вручную через вкладку Actions
  # workflow_dispatch:

  # Запуск только при создании Pull Request в ветку main
  # pull_request:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Проверка стиля кода и потенциальных ошибок
      - name: Run Linter (Detekt/Lint)
        run: ./gradlew lintDebug

      # Проверка, что проект вообще собирается
      - name: Assemble Debug APK
        run: ./gradlew assembleDebug
